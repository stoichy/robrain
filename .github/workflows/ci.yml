name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # shared/perception test scripts run `bun test src`
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile

      # Downstream packages typecheck against @robrain/shared's dist
      - run: pnpm -r build

      - run: pnpm -r typecheck

      - run: pnpm -r test

      # Retrieval-quality gate — fails below precision/recall thresholds
      # (see packages/eval/README.md)
      - run: pnpm --filter @robrain/eval eval
