# docker/docker-compose.yml
# ─────────────────────────────────────────────────────────────
# RoBrain self-hosted stack
# Includes: Postgres + pgvector, Perception API (basic extraction)
#
# Quick start (from repo root):
#   cp .env.example .env   # fill in API keys
#   pnpm docker:up
#   docker compose -f docker/docker-compose.yml logs -f perception
# ─────────────────────────────────────────────────────────────

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: robrain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-robrain}
      # No default — `pnpm docker:up` runs scripts/prepare-env.mjs first to populate this.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (run `pnpm docker:up` to auto-generate)}
      POSTGRES_DB:       ${POSTGRES_DB:-robrain}
    # Bound to localhost so the database is not reachable from the LAN.
    # Override POSTGRES_BIND_HOST=0.0.0.0 in .env if you actually need remote access.
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - robrain_postgres_data:/var/lib/postgresql/data
      - ../packages/shared/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robrain}"]
      interval: 5s
      timeout: 5s
      retries: 10

  perception:
    build:
      context: ..
      dockerfile: docker/Dockerfile.perception
    container_name: robrain-perception
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Load API keys / model embed settings from repo-root `.env` inside the container.
    # Omitting `${VAR}` for those keys avoids Compose shell substitution: an empty exported
    # `ANTHROPIC_API_KEY=` in the host would otherwise win over values in `--env-file .env`.
    env_file:
      - ../.env
    environment:
      PORT:              ${PERCEPTION_PORT:-3001}
      DATABASE_URL:      postgres://${POSTGRES_USER:-robrain}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-robrain}
      DB_SCHEMA:         context_system
      # OSS mode — basic extraction, no veto-preserving prompt
      OSS_MODE:          "true"
    # Bound to localhost; same override as Postgres if you need a remote VM to reach it.
    ports:
      - "${PERCEPTION_BIND_HOST:-127.0.0.1}:${PERCEPTION_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  robrain_postgres_data:
    name: robrain_postgres_data
